<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TransitOps — Fleet Command</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{
  --asphalt-0:#0B0E13;
  --asphalt-1:#12161D;
  --asphalt-2:#1A2028;
  --asphalt-3:#232A34;
  --border:#2B3340;
  --border-soft:#20262f;
  --text-hi:#EDEFF3;
  --text-mid:#A6AFBD;
  --text-lo:#6C7686;
  --signal-amber:#FFB020;
  --signal-amber-dim:#8a5f16;
  --route-teal:#2FD6A7;
  --alert-red:#FF5C6C;
  --info-blue:#5AA9FF;
  --radius:8px;
  --radius-sm:5px;
  font-family:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--asphalt-0);color:var(--text-hi);}
body{overflow:hidden;}
::selection{background:var(--signal-amber);color:#1a1206;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--asphalt-3);border-radius:8px;}
#app{height:100vh;width:100vw;display:flex;flex-direction:column;background:
  radial-gradient(circle at 15% 0%, rgba(255,176,32,0.05), transparent 45%),
  var(--asphalt-0);}

.mono{font-family:'JetBrains Mono',monospace;}
.display{font-family:'Barlow Condensed',sans-serif;letter-spacing:0.02em;}

/* ---------- Loading ---------- */
.boot{height:100%;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.boot .plate{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--signal-amber);border:1.5px dashed var(--signal-amber-dim);padding:8px 18px;border-radius:4px;letter-spacing:0.15em;}
.boot .bar{width:220px;height:3px;background:var(--asphalt-2);border-radius:2px;overflow:hidden;}
.boot .bar span{display:block;height:100%;width:30%;background:linear-gradient(90deg,var(--signal-amber),var(--route-teal));animation:load 1.1s ease-in-out infinite;}
@keyframes load{0%{transform:translateX(-100%);}100%{transform:translateX(430%);}}
.boot small{color:var(--text-lo);font-size:12px;}

/* ---------- Login ---------- */
.login-screen{height:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.login-screen::before{content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(100deg, transparent 0 120px, rgba(255,176,32,0.045) 120px 122px);
  pointer-events:none;}
.login-card{position:relative;z-index:1;width:420px;max-width:92vw;padding:40px 34px;background:var(--asphalt-1);border:1px solid var(--border);border-radius:14px;box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);}
.login-brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.login-brand .dash{width:26px;height:4px;background:var(--signal-amber);border-radius:2px;}
.login-title{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;margin:0;}
.login-sub{color:var(--text-mid);font-size:13px;margin:6px 0 28px;line-height:1.5;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.role-btn{background:var(--asphalt-2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 12px;cursor:pointer;text-align:left;transition:.15s;color:var(--text-hi);}
.role-btn:hover{border-color:var(--signal-amber);background:var(--asphalt-3);transform:translateY(-1px);}
.role-btn .r-icon{font-size:18px;display:block;margin-bottom:8px;}
.role-btn .r-label{font-size:13px;font-weight:600;display:block;}
.role-btn .r-desc{font-size:11px;color:var(--text-lo);display:block;margin-top:2px;}
.login-foot{margin-top:24px;font-size:11px;color:var(--text-lo);border-top:1px solid var(--border-soft);padding-top:14px;line-height:1.6;}
.login-foot b{color:var(--text-mid);}

/* ---------- Shell ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 22px;background:var(--asphalt-1);border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--route-teal);box-shadow:0 0 8px var(--route-teal);}
.topbar-right{display:flex;align-items:center;gap:14px;}
.user-chip{font-size:12px;color:var(--text-mid);display:flex;align-items:center;gap:8px;}
.user-chip b{color:var(--text-hi);font-weight:600;}
.role-pill{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;background:var(--asphalt-3);border:1px solid var(--border);padding:3px 8px;border-radius:20px;color:var(--signal-amber);}
.btn{font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-hi);cursor:pointer;transition:.12s;}
.btn:hover{border-color:var(--text-mid);}
.btn-primary{background:var(--signal-amber);color:#1a1206;border-color:var(--signal-amber);}
.btn-primary:hover{background:#ffc04d;}
.btn-danger{color:var(--alert-red);}
.btn-danger:hover{border-color:var(--alert-red);}
.btn-ghost{border-color:transparent;color:var(--text-mid);}
.btn-sm{padding:5px 9px;font-size:11px;}

.tabs{display:flex;gap:4px;padding:10px 22px;background:var(--asphalt-0);border-bottom:1px solid var(--border-soft);overflow-x:auto;flex-shrink:0;}
.tab-btn{font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:20px;border:1px solid transparent;background:transparent;color:var(--text-mid);cursor:pointer;white-space:nowrap;transition:.12s;}
.tab-btn:hover{color:var(--text-hi);}
.tab-btn.active{background:var(--asphalt-2);border-color:var(--border);color:var(--signal-amber);}

.content{flex:1;overflow-y:auto;padding:22px;}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;margin:0;}
.page-sub{color:var(--text-lo);font-size:12.5px;margin-top:3px;}

/* ---------- KPI cards ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:22px;}
.kpi-card{background:var(--asphalt-1);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden;}
.kpi-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--kpi-color,var(--signal-amber));}
.kpi-label{font-size:11px;color:var(--text-lo);text-transform:uppercase;letter-spacing:0.05em;margin:0 0 8px;}
.kpi-value{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;margin:0;}
.kpi-value small{font-size:13px;color:var(--text-lo);font-weight:500;}

/* ---------- Cards / panels ---------- */
.panel{background:var(--asphalt-1);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:18px;}
.panel-title{font-size:13px;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:0.04em;margin:0 0 14px;}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:18px;}
.chart-box{height:260px;}

/* ---------- Tables ---------- */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--asphalt-1);}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{text-align:left;padding:10px 12px;background:var(--asphalt-2);color:var(--text-lo);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border-soft);color:var(--text-hi);white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:rgba(255,176,32,0.035);}
tbody tr.flag-row{background:rgba(255,92,108,0.06);}
.plate{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--asphalt-3);border:1px solid var(--border);padding:2px 7px;border-radius:4px;letter-spacing:0.03em;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.03em;}
.b-green{background:rgba(47,214,167,0.14);color:var(--route-teal);}
.b-amber{background:rgba(255,176,32,0.14);color:var(--signal-amber);}
.b-red{background:rgba(255,92,108,0.14);color:var(--alert-red);}
.b-blue{background:rgba(90,169,255,0.14);color:var(--info-blue);}
.b-grey{background:var(--asphalt-3);color:var(--text-mid);}
.cell-actions{display:flex;gap:6px;}
.icon-btn{background:transparent;border:1px solid var(--border);color:var(--text-mid);border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;}
.icon-btn:hover{color:var(--text-hi);border-color:var(--text-mid);}
.icon-btn.del:hover{color:var(--alert-red);border-color:var(--alert-red);}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.search-input,select.filter{background:var(--asphalt-2);border:1px solid var(--border);color:var(--text-hi);padding:8px 12px;border-radius:var(--radius-sm);font-size:12.5px;font-family:inherit;}
.search-input{min-width:220px;}
.search-input:focus,select.filter:focus,input:focus,textarea:focus{outline:none;border-color:var(--signal-amber);}
.empty-state{padding:40px 20px;text-align:center;color:var(--text-lo);font-size:12.5px;}

/* ---------- Modal / form ---------- */
.modal-backdrop{position:fixed;inset:0;background:rgba(6,8,11,0.7);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(2px);}
.modal{width:560px;max-width:92vw;max-height:88vh;overflow-y:auto;background:var(--asphalt-1);border:1px solid var(--border);border-radius:12px;padding:24px;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;margin:0 0 4px;}
.modal-sub{color:var(--text-lo);font-size:11.5px;margin:0 0 18px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:11px;color:var(--text-mid);text-transform:uppercase;letter-spacing:0.04em;}
.form-field input,.form-field select,.form-field textarea{background:var(--asphalt-2);border:1px solid var(--border);color:var(--text-hi);padding:9px 10px;border-radius:var(--radius-sm);font-size:13px;font-family:inherit;width:100%;}
.form-field textarea{resize:vertical;min-height:70px;font-family:'JetBrains Mono',monospace;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border-soft);padding-top:16px;margin-top:4px;}
.warn-note{font-size:11.5px;color:var(--signal-amber);background:rgba(255,176,32,0.08);border:1px solid var(--signal-amber-dim);padding:8px 10px;border-radius:6px;margin-bottom:14px;}

/* ---------- SQL console ---------- */
.sql-console textarea{width:100%;min-height:110px;background:var(--asphalt-0);border:1px solid var(--border);color:var(--route-teal);padding:12px;border-radius:var(--radius-sm);font-family:'JetBrains Mono',monospace;font-size:12.5px;resize:vertical;}
.sql-hint{font-size:11px;color:var(--text-lo);margin-top:8px;line-height:1.6;}
.sql-hint code{color:var(--text-mid);background:var(--asphalt-2);padding:1px 5px;border-radius:3px;}
.sql-error{color:var(--alert-red);font-size:12px;margin-top:10px;font-family:'JetBrains Mono',monospace;background:rgba(255,92,108,0.08);padding:8px 10px;border-radius:6px;}

.toast{position:fixed;bottom:22px;right:22px;background:var(--asphalt-2);border:1px solid var(--border);border-left:3px solid var(--route-teal);color:var(--text-hi);padding:11px 16px;border-radius:8px;font-size:12.5px;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,0.4);animation:toastin .18s ease-out;}
.toast.err{border-left-color:var(--alert-red);}
@keyframes toastin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:640px){.form-grid{grid-template-columns:1fr;}.role-grid{grid-template-columns:1fr;}}
</style>
</head>

/* =========================================================
   DB INIT
   ========================================================= */
async function boot(){
  SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });

  let restored = false;
  try{
    const saved = await window.storage.get('transitops_db', true);
    if(saved && saved.value){
      const bytes = base64ToBytes(saved.value);
      db = new SQL.Database(bytes);
      restored = true;
    }
  }catch(e){ /* no saved db yet */ }

  if(!restored){
    db = new SQL.Database();
    createSchema();
    seedData();
    await persist();
  }
  renderApp();
}

function createSchema(){
  db.run(`
    CREATE TABLE vehicles(
      id INTEGER PRIMARY KEY,
      model TEXT, age_years INTEGER, reg_number TEXT, vehicle_type TEXT,
      number_plate TEXT, date_of_registration TEXT, maintenance_due_date TEXT,
      max_cargo_kg INTEGER, acquisition_cost_inr INTEGER, status TEXT,
      odometer_km INTEGER, avg_mileage REAL
    );
    CREATE TABLE drivers(
      id INTEGER PRIMARY KEY,
      name TEXT, age INTEGER, experience_years INTEGER, license_validity TEXT,
      status TEXT, license_number TEXT, license_category TEXT,
      contact_number TEXT, safety_score INTEGER
    );
    CREATE TABLE trips(
      id INTEGER PRIMARY KEY,
      trip_code TEXT, start_place TEXT, destination TEXT, vehicle_plate TEXT,
      driver_name TEXT, cargo_weight_kg TEXT, planned_distance_km TEXT,
      departure_date TEXT, departure_time TEXT, arrival_date TEXT,
      arrival_time TEXT, status TEXT, revenue_inr INTEGER DEFAULT 0
    );
    CREATE TABLE maintenance_logs(
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      vehicle_plate TEXT, type TEXT, date TEXT, cost_inr INTEGER, status TEXT
    );
    CREATE TABLE fuel_logs(
      id INTEGER PRIMARY KEY AUTOINCREMENT,
      vehicle_plate TEXT, liters REAL, cost_inr INTEGER, date TEXT
    );
  `);
}

function seedData(){
  const vStmt = db.prepare(`INSERT INTO vehicles VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?)`);
  SEED_TRUCKS.forEach(r=>{
    vStmt.run([parseInt(r[0]), r[1], parseInt(r[2]), r[3], r[4], r[5], r[6], r[7],
      parseInt(r[8]), parseInt(r[9]), r[10], parseInt(r[11]), parseFloat(r[12])]);
  });
  vStmt.free();

  const dStmt = db.prepare(`INSERT INTO drivers VALUES (?,?,?,?,?,?,?,?,?,?)`);
  SEED_DRIVERS.forEach(r=>{
    dStmt.run([parseInt(r[0]), r[1], parseInt(r[2]), parseInt(r[3]), r[4], r[5], r[6], r[7], r[8], parseInt(r[9])]);
  });
  dStmt.free();

  const tStmt = db.prepare(`INSERT INTO trips (id,trip_code,start_place,destination,vehicle_plate,driver_name,cargo_weight_kg,planned_distance_km,departure_date,departure_time,arrival_date,arrival_time,status,revenue_inr) VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,0)`);
  SEED_TRIPS.forEach(r=>{
    tStmt.run([parseInt(r[0]), r[1], r[2], r[3], r[4], r[5], r[6], r[7], r[8], r[9], r[10], r[11], r[12]]);
  });
  tStmt.free();

  // seed a handful of maintenance logs for vehicles currently under Maintenance
  const mStmt = db.prepare(`INSERT INTO maintenance_logs (vehicle_plate,type,date,cost_inr,status) VALUES (?,?,?,?,?)`);
  const svc = ['Engine Overhaul','Brake Service','Tire Replacement','Suspension Check','Oil & Filter Change'];
  let i=0;
  SEED_TRUCKS.filter(r=>r[10]==='Maintenance').forEach(r=>{
    mStmt.run([r[5], svc[i%svc.length], r[7], 8000+(i*1750)%40000, 'Active']);
    i++;
  });
  mStmt.free();
}

async function persist(){
  const bytes = db.export();
  const b64 = bytesToBase64(bytes);
  try{ await window.storage.set('transitops_db', b64, true); }
  catch(e){ console.error('persist failed', e); }
}

function bytesToBase64(bytes){
  let binary=''; const chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk){ binary += String.fromCharCode.apply(null, bytes.subarray(i,i+chunk)); }
  return btoa(binary);
}
function base64ToBytes(b64){
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return bytes;
}

/* =========================================================
   QUERY HELPERS
   ========================================================= */
function q(sql, params=[]){
  const stmt = db.prepare(sql);
  if(params.length) stmt.bind(params);
  const rows=[];
  while(stmt.step()) rows.push(stmt.getAsObject());
  stmt.free();
  return rows;
}
function run(sql, params=[]){
  db.run(sql, params);
}
async function mutate(sql, params=[]){
  run(sql, params);
  await persist();
  renderApp();
}

/* =========================================================
   DATE HELPERS  (source dates are DD-MM-YYYY or DD-MM-YY)
   ========================================================= */
function parseDMY(str){
  if(!str || str==='TBD') return null;
  const m = str.match(/^(\d{1,2})-(\d{1,2})-(\d{2,4})$/);
  if(!m) return null;
  let [_,d,mo,y] = m;
  if(y.length===2) y = (parseInt(y)<70?'20':'19')+y;
  const dt = new Date(parseInt(y), parseInt(mo)-1, parseInt(d));
  return isNaN(dt) ? null : dt;
}
function isExpired(str){
  const d = parseDMY(str);
  return d ? d < new Date() : false;
}
function daysUntil(str){
  const d = parseDMY(str);
  if(!d) return null;
  return Math.round((d - new Date())/86400000);
}
function money(n){
  if(n===null||n===undefined||isNaN(n)) return '—';
  return '₹' + Number(n).toLocaleString('en-IN');
}
function esc(s){ return (s===null||s===undefined) ? '' : String(s).replace(/</g,'&lt;'); }

/* =========================================================
   TOAST
   ========================================================= */
let toastTimer=null;
function toast(msg, isErr=false){
  clearTimeout(toastTimer);
  let el = document.getElementById('toastEl');
  if(!el){ el=document.createElement('div'); el.id='toastEl'; document.body.appendChild(el); }
  el.className = 'toast'+(isErr?' err':'');
  el.textContent = msg;
  toastTimer = setTimeout(()=>el.remove(), 2600);
}

/* =========================================================
   DASHBOARD
   ========================================================= */
function dashboardHTML(){
  const totalV = q(`SELECT COUNT(*) n FROM vehicles`)[0].n;
  const onTrip = q(`SELECT COUNT(*) n FROM vehicles WHERE status='On trip'`)[0].n;
  const avail = q(`SELECT COUNT(*) n FROM vehicles WHERE status='Available'`)[0].n;
  const maint = q(`SELECT COUNT(*) n FROM vehicles WHERE status='Maintenance'`)[0].n;
  const dispatched = q(`SELECT COUNT(*) n FROM trips WHERE status='Dispatched'`)[0].n;
  const draft = q(`SELECT COUNT(*) n FROM trips WHERE status='Draft'`)[0].n;
  const completed = q(`SELECT COUNT(*) n FROM trips WHERE status='Completed'`)[0].n;
  const driversOnTrip = q(`SELECT COUNT(*) n FROM drivers WHERE status='On trip'`)[0].n;
  const suspended = q(`SELECT COUNT(*) n FROM drivers WHERE status='Suspended'`)[0].n;
  const expiringDrivers = q(`SELECT * FROM drivers`).filter(d=>{const dd=daysUntil(d.license_validity); return dd!==null && dd<45;});
  const dueVehicles = q(`SELECT * FROM vehicles`).filter(v=>{const dd=daysUntil(v.maintenance_due_date); return dd!==null && dd<21;});
  const util = totalV ? ((onTrip/totalV)*100).toFixed(1) : '0.0';

  const kpis = [
    {label:'Fleet Size', value:totalV, color:'var(--info-blue)'},
    {label:'On Trip', value:onTrip, color:'var(--signal-amber)'},
    {label:'Available', value:avail, color:'var(--route-teal)'},
    {label:'In Maintenance', value:maint, color:'var(--alert-red)'},
    {label:'Fleet Utilization', value:util+'%', color:'var(--signal-amber)'},
    {label:'Dispatched Trips', value:dispatched, color:'var(--info-blue)'},
    {label:'Draft Trips', value:draft, color:'var(--text-mid)'},
    {label:'Drivers On Trip', value:driversOnTrip, color:'var(--route-teal)'},
  ];

  return `
  <div class="page-head">
    <div><h2 class="page-title display">Command Overview</h2><p class="page-sub">Live snapshot, computed straight from SQL aggregates.</p></div>
  </div>
  <div class="kpi-grid">
    ${kpis.map(k=>`<div class="kpi-card" style="--kpi-color:${k.color}"><p class="kpi-label">${k.label}</p><p class="kpi-value display">${k.value}</p></div>`).join('')}
  </div>
  <div class="chart-grid">
    <div class="panel">
      <p class="panel-title">⚠ Licenses Expiring &lt; 45 Days (${expiringDrivers.length})</p>
      ${expiringDrivers.length ? `<div class="table-wrap"><table><thead><tr><th>Driver</th><th>License #</th><th>Valid Until</th><th>Days Left</th><th>Status</th></tr></thead><tbody>
        ${expiringDrivers.sort((a,b)=>daysUntil(a.license_validity)-daysUntil(b.license_validity)).map(d=>{
          const dl=daysUntil(d.license_validity);
          return `<tr class="${dl<0?'flag-row':''}"><td>${esc(d.name)}</td><td class="mono">${esc(d.license_number)}</td><td>${esc(d.license_validity)}</td><td>${dl<0?`<span class="badge b-red">Expired ${Math.abs(dl)}d ago</span>`:`<span class="badge b-amber">${dl}d</span>`}</td><td>${statusBadge(d.status)}</td></tr>`;
        }).join('')}
      </tbody></table></div>` : `<div class="empty-state">All driver licenses are in good standing.</div>`}
    </div>
    <div class="panel">
      <p class="panel-title">🔧 Maintenance Due &lt; 21 Days (${dueVehicles.length})</p>
      ${dueVehicles.length ? `<div class="table-wrap"><table><thead><tr><th>Vehicle</th><th>Plate</th><th>Due Date</th><th>Days Left</th><th>Status</th></tr></thead><tbody>
        ${dueVehicles.sort((a,b)=>daysUntil(a.maintenance_due_date)-daysUntil(b.maintenance_due_date)).map(v=>{
          const dl=daysUntil(v.maintenance_due_date);
          return `<tr class="${dl<0?'flag-row':''}"><td>${esc(v.model)}</td><td class="plate">${esc(v.number_plate)}</td><td>${esc(v.maintenance_due_date)}</td><td>${dl<0?`<span class="badge b-red">Overdue ${Math.abs(dl)}d</span>`:`<span class="badge b-amber">${dl}d</span>`}</td><td>${statusBadge(v.status)}</td></tr>`;
        }).join('')}
      </tbody></table></div>` : `<div class="empty-state">No vehicles due for service soon.</div>`}
    </div>
  </div>`;
}

function statusBadge(status){
  const map = {
    'Available':'b-green','On trip':'b-amber','Maintenance':'b-red','Retired':'b-grey',
    'Off duty':'b-blue','Suspended':'b-red',
    'Completed':'b-green','Dispatched':'b-amber','Draft':'b-grey','Cancelled':'b-red','Active':'b-amber','Closed':'b-green'
  };
  return `<span class="badge ${map[status]||'b-grey'}">${esc(status)}</span>`;
}

function analyticsHTML(){

    <div class="kpi-card" style="--kpi-color:var(--route-teal)"><p class="kpi-label">Logged Trip Revenue</p><p class="kpi-value display">${money(totalRevenue)}</p></div>
    <div class="kpi-card" style="--kpi-color:var(--signal-amber)"><p class="kpi-label">Fleet Avg. Mileage</p><p class="kpi-value display">${avgMileage.toFixed(1)} <small>km/l</small></p></div>
    <div class="kpi-card" style="--kpi-color:var(--info-blue)"><p class="kpi-label">Completed Trips</p><p class="kpi-value display">${completedTrips}</p></div>
  </div>
  <div class="chart-grid">
    <div class="panel"><p class="panel-title">Fleet Composition by Vehicle Type</p><div class="chart-box"><canvas id="chartFleetType"></canvas></div></div>
    <div class="panel"><p class="panel-title">Vehicle Status Split</p><div class="chart-box"><canvas id="chartStatus"></canvas></div></div>
    <div class="panel"><p class="panel-title">Trip Status Funnel</p><div class="chart-box"><canvas id="chartTrips"></canvas></div></div>
    <div class="panel"><p class="panel-title">Maintenance Cost by Vehicle</p><div class="chart-box"><canvas id="chartMaintCost"></canvas></div></div>
  </div>`;
}
let chartInstances = [];
function renderCharts(){
  chartInstances.forEach(c=>c.destroy());
  chartInstances = [];
  const gridColor = 'rgba(255,255,255,0.06)';
  const textColor = '#A6AFBD';
  Chart.defaults.color = textColor;
  Chart.defaults.font.family = "'Inter',sans-serif";

  const typeData = q(`SELECT vehicle_type, COUNT(*) n FROM vehicles GROUP BY vehicle_type ORDER BY n DESC`);
  chartInstances.push(new Chart(document.getElementById('chartFleetType'), {
    type:'bar',
    data:{ labels: typeData.map(r=>r.vehicle_type), datasets:[{ data: typeData.map(r=>r.n), backgroundColor:'#FFB020', borderRadius:4 }]},
    options:{ plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false}}, y:{grid:{color:gridColor}, ticks:{stepSize:1}} }, responsive:true, maintainAspectRatio:false }
  }));

  const statusData = q(`SELECT status, COUNT(*) n FROM vehicles GROUP BY status`);
  const statusColors = {'Available':'#2FD6A7','On trip':'#FFB020','Maintenance':'#FF5C6C','Retired':'#6C7686'};
  chartInstances.push(new Chart(document.getElementById('chartStatus'), {
    type:'doughnut',
    data:{ labels: statusData.map(r=>r.status), datasets:[{ data: statusData.map(r=>r.n), backgroundColor: statusData.map(r=>statusColors[r.status]||'#6C7686'), borderWidth:0 }]},
    options:{ plugins:{legend:{position:'bottom', labels:{boxWidth:10,padding:14}}}, responsive:true, maintainAspectRatio:false }
  }));

  const tripData = q(`SELECT status, COUNT(*) n FROM trips GROUP BY status`);
  const tripColors = {'Completed':'#2FD6A7','Dispatched':'#FFB020','Draft':'#6C7686','Cancelled':'#FF5C6C'};
  chartInstances.push(new Chart(document.getElementById('chartTrips'), {
    type:'bar',
    data:{ labels: tripData.map(r=>r.status), datasets:[{ data: tripData.map(r=>r.n), backgroundColor: tripData.map(r=>tripColors[r.status]||'#6C7686'), borderRadius:4 }]},
    options:{ indexAxis:'y', plugins:{legend:{display:false}}, scales:{ x:{grid:{color:gridColor}, ticks:{stepSize:1}}, y:{grid:{display:false}} }, responsive:true, maintainAspectRatio:false }
  }));

  const maintData = q(`SELECT vehicle_plate, SUM(cost_inr) s FROM maintenance_logs GROUP BY vehicle_plate ORDER BY s DESC`);
  chartInstances.push(new Chart(document.getElementById('chartMaintCost'), {
    type:'bar',
    data:{ labels: maintData.map(r=>r.vehicle_plate), datasets:[{ data: maintData.map(r=>r.s), backgroundColor:'#FF5C6C', borderRadius:4 }]},
    options:{ plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false}, ticks:{maxRotation:45,minRotation:45,font:{size:10}}}, y:{grid:{color:gridColor}} }, responsive:true, maintainAspectRatio:false }
  }));
}

  return `
  <div class="page-head">
    <div><h2 class="page-title display">SQL Console</h2><p class="page-sub">Run read queries directly against the live embedded database.</p></div>
  </div>
  <div class="panel sql-console">
    <textarea id="sqlInput" placeholder="SELECT * FROM vehicles WHERE status = 'Maintenance';">SELECT model, number_plate, status, avg_mileage FROM vehicles ORDER BY avg_mileage DESC LIMIT 10;</textarea>
    <div style="margin-top:10px;display:flex;gap:8px;">
      <button class="btn btn-primary btn-sm" id="runSqlBtn">Run Query</button>
      <button class="btn btn-ghost btn-sm" id="clearSqlBtn">Clear</button>
    </div>
    <p class="sql-hint">Tables: <code>vehicles</code>, <code>drivers</code>, <code>trips</code>, <code>maintenance_logs</code>, <code>fuel_logs</code>. Only <code>SELECT</code> statements are executed here for safety — use the Vehicles / Drivers / Trips / Maintenance tabs for writes.</p>
    ${sqlError?`<div class="sql-error">${esc(sqlError)}</div>`:''}
  </div>
  ${sqlResult?`<div class="table-wrap"><table>
    <thead><tr>${sqlResult.columns.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead>
    <tbody>${sqlResult.values.length===0?`<tr><td colspan="${sqlResult.columns.length}"><div class="empty-state">Query returned no rows.</div></td></tr>`:
      sqlResult.values.map(row=>`<tr>${row.map(v=>`<td>${esc(v)}</td>`).join('')}</tr>`).join('')}
    </tbody>
  </table></div>`:''}`;
}
function attachConsoleEvents(){
  document.getElementById('runSqlBtn').addEventListener('click', ()=>{
    const sql = document.getElementById('sqlInput').value.trim();
    sqlError=null; sqlResult=null;
    if(!/^select/i.test(sql)){ sqlError='Only SELECT statements are allowed in this console.'; renderTab(); return; }
    try{
      const res = db.exec(sql);
      sqlResult = res[0] || {columns:[], values:[]};
    }catch(e){ sqlError = e.message; }
    renderTab();
  });
  document.getElementById('clearSqlBtn').addEventListener('click', ()=>{ sqlResult=null; sqlError=null; renderTab(); });
}

/* =========================================================
   MODALS (CRUD FORMS)
   ========================================================= */
function closeModal(){ modal=null; renderApp(); }

function renderModal(){
  const host = document.createElement('div');
  host.id = 'modalHost';
  document.body.appendChild(host);
  if(modal.type==='vehicle') host.innerHTML = vehicleFormHTML(modal.record);
  else if(modal.type==='driver') host.innerHTML = driverFormHTML(modal.record);
  else if(modal.type==='trip') host.innerHTML = tripFormHTML(modal.record);
  else if(modal.type==='maintenance') host.innerHTML = maintFormHTML(modal.record);
  attachModalEvents();
}

  const vehicles = q(`SELECT number_plate FROM vehicles ORDER BY number_plate`);

    <h3 class="modal-title display">${modal.record?'Edit Maintenance':'Log Maintenance'}</h3>
    <p class="modal-sub">Writes directly to the <span class="mono">maintenance_logs</span> table. Marking "Active" flags the vehicle as In Maintenance; "Closed" restores it to Available.</p>
    <div class="form-grid">
      <div class="form-field"><label>Vehicle Plate</label><select id="f_plate">${vehicles.map(v=>`<option ${v.number_plate===r.vehicle_plate?'selected':''}>${v.number_plate}</option>`).join('')}</select></div>

function attachModalEvents(){
  document.getElementById('backdrop').addEventListener('click', e=>{ if(e.target.id==='backdrop') closeModal(); });
  const cancel = document.getElementById('cancelModal');
  if(cancel) cancel.addEventListener('click', closeModal);

  const saveVehicle = document.getElementById('saveVehicle');
  if(saveVehicle) saveVehicle.addEventListener('click', async ()=>{
    const vals = {
      model: document.getElementById('f_model').value.trim(),
      plate: document.getElementById('f_plate').value.trim(),
      type: document.getElementById('f_type').value,
      reg: document.getElementById('f_reg').value.trim(),
      cargo: parseInt(document.getElementById('f_cargo').value)||0,
      cost: parseInt(document.getElementById('f_cost').value)||0,
      odo: parseInt(document.getElementById('f_odo').value)||0,
      mileage: parseFloat(document.getElementById('f_mileage').value)||0,
      due: document.getElementById('f_duedate').value.trim(),
      status: document.getElementById('f_status').value,
    };
    if(!vals.model || !vals.plate){ toast('Model and plate are required', true); return; }
    if(modal.record){
      await mutate(`UPDATE vehicles SET model=?,number_plate=?,vehicle_type=?,reg_number=?,max_cargo_kg=?,acquisition_cost_inr=?,odometer_km=?,avg_mileage=?,maintenance_due_date=?,status=? WHERE id=?`,
        [vals.model,vals.plate,vals.type,vals.reg,vals.cargo,vals.cost,vals.odo,vals.mileage,vals.due,vals.status, modal.record.id]);
      toast('Vehicle updated');
    }else{
      const nextId = (q(`SELECT MAX(id) m FROM vehicles`)[0].m||0)+1;
      await mutate(`INSERT INTO vehicles (id,model,age_years,reg_number,vehicle_type,number_plate,date_of_registration,maintenance_due_date,max_cargo_kg,acquisition_cost_inr,status,odometer_km,avg_mileage) VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?)`,
        [nextId,vals.model,0,vals.reg,vals.type,vals.plate,'',vals.due,vals.cargo,vals.cost,vals.status,vals.odo,vals.mileage]);
      toast('Vehicle added');
    }
    closeModal();
  });

  const saveDriver = document.getElementById('saveDriver');
  if(saveDriver) saveDriver.addEventListener('click', async ()=>{
    const vals = {
      name: document.getElementById('f_name').value.trim(),
      age: parseInt(document.getElementById('f_age').value)||0,
      lic: document.getElementById('f_lic').value.trim(),
      cat: document.getElementById('f_cat').value,
      valid: document.getElementById('f_valid').value.trim(),
      exp: parseInt(document.getElementById('f_exp').value)||0,
      contact: document.getElementById('f_contact').value.trim(),
      score: Math.max(0,Math.min(100, parseInt(document.getElementById('f_score').value)||0)),
      status: document.getElementById('f_status').value,
    };
    if(!vals.name){ toast('Driver name is required', true); return; }
    if(modal.record){
      await mutate(`UPDATE drivers SET name=?,age=?,experience_years=?,license_validity=?,status=?,license_number=?,license_category=?,contact_number=?,safety_score=? WHERE id=?`,
        [vals.name,vals.age,vals.exp,vals.valid,vals.status,vals.lic,vals.cat,vals.contact,vals.score, modal.record.id]);
      toast('Driver updated');
    }else{
      const nextId = (q(`SELECT MAX(id) m FROM drivers`)[0].m||0)+1;
      await mutate(`INSERT INTO drivers (id,name,age,experience_years,license_validity,status,license_number,license_category,contact_number,safety_score) VALUES (?,?,?,?,?,?,?,?,?,?)`,
        [nextId,vals.name,vals.age,vals.exp,vals.valid,vals.status,vals.lic,vals.cat,vals.contact,vals.score]);
      toast('Driver added');
    }
    closeModal();
  });

  const saveTrip = document.getElementById('saveTrip');
  if(saveTrip) saveTrip.addEventListener('click', async ()=>{
    const vals = {
      code: document.getElementById('f_code').value.trim(),
      status: document.getElementById('f_status').value,
      start: document.getElementById('f_start').value.trim(),
      dest: document.getElementById('f_dest').value.trim(),
      vehicle: document.getElementById('f_vehicle').value,
      driver: document.getElementById('f_driver').value,
      cargo: document.getElementById('f_cargo').value.trim()||'TBD',
      dist: document.getElementById('f_dist').value.trim()||'TBD',
      ddate: document.getElementById('f_ddate').value.trim()||'TBD',
      dtime: document.getElementById('f_dtime').value.trim()||'TBD',
      adate: document.getElementById('f_adate').value.trim()||'TBD',
      atime: document.getElementById('f_atime').value.trim()||'TBD',
      rev: parseInt(document.getElementById('f_rev').value)||0,
    };
    if(!vals.start || !vals.dest){ toast('Start and destination are required', true); return; }
    const distNum = parseInt(vals.dist);

    if(modal.record){
      await new Promise(res=>{ run(`UPDATE trips SET trip_code=?,start_place=?,destination=?,vehicle_plate=?,driver_name=?,cargo_weight_kg=?,planned_distance_km=?,departure_date=?,departure_time=?,arrival_date=?,arrival_time=?,status=?,revenue_inr=? WHERE id=?`,
        [vals.code,vals.start,vals.dest,vals.vehicle,vals.driver,vals.cargo,vals.dist,vals.ddate,vals.dtime,vals.adate,vals.atime,vals.status,vals.rev, modal.record.id]); res(); });
    }else{
      const nextId = (q(`SELECT MAX(id) m FROM trips`)[0].m||0)+1;
      run(`INSERT INTO trips (id,trip_code,start_place,destination,vehicle_plate,driver_name,cargo_weight_kg,planned_distance_km,departure_date,departure_time,arrival_date,arrival_time,status,revenue_inr) VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?)`,
        [nextId,vals.code,vals.start,vals.dest,vals.vehicle,vals.driver,vals.cargo,vals.dist,vals.ddate,vals.dtime,vals.adate,vals.atime,vals.status,vals.rev]);
    }

    // cascade status changes onto linked vehicle/driver, mirroring the original dispatch logic
    if(vals.vehicle!=='TBD'){
      if(vals.status==='Dispatched') run(`UPDATE vehicles SET status='On trip' WHERE number_plate=?`,[vals.vehicle]);
      else if(vals.status==='Completed'){
        if(!isNaN(distNum)) run(`UPDATE vehicles SET status='Available', odometer_km = odometer_km + ? WHERE number_plate=?`,[distNum, vals.vehicle]);
        else run(`UPDATE vehicles SET status='Available' WHERE number_plate=?`,[vals.vehicle]);
      }
    }
    if(vals.driver!=='TBD'){
      if(vals.status==='Dispatched') run(`UPDATE drivers SET status='On trip' WHERE name=?`,[vals.driver]);
      else if(vals.status==='Completed'||vals.status==='Cancelled') run(`UPDATE drivers SET status='Available' WHERE name=? AND status='On trip'`,[vals.driver]);
    }
    await persist();
    toast(modal.record?'Trip updated':'Trip created');
    closeModal();
  });

  const saveMaint = document.getElementById('saveMaint');
  if(saveMaint) saveMaint.addEventListener('click', async ()=>{
    const vals = {
      plate: document.getElementById('f_plate').value,
      type: document.getElementById('f_type').value.trim(),
      date: document.getElementById('f_date').value.trim(),
      cost: parseInt(document.getElementById('f_cost').value)||0,
      status: document.getElementById('f_status').value,
    };
    if(!vals.type){ toast('Service type is required', true); return; }
    if(modal.record){
      run(`UPDATE maintenance_logs SET vehicle_plate=?,type=?,date=?,cost_inr=?,status=? WHERE id=?`,
        [vals.plate,vals.type,vals.date,vals.cost,vals.status, modal.record.id]);
    }else{
      run(`INSERT INTO maintenance_logs (vehicle_plate,type,date,cost_inr,status) VALUES (?,?,?,?,?)`,
        [vals.plate,vals.type,vals.date,vals.cost,vals.status]);
    }
    if(vals.status==='Active') run(`UPDATE vehicles SET status='Maintenance' WHERE number_plate=?`,[vals.plate]);
    else run(`UPDATE vehicles SET status='Available' WHERE number_plate=? AND status='Maintenance'`,[vals.plate]);
    await persist();
    toast(modal.record?'Record updated':'Maintenance logged');
    closeModal();
  });
}

// clean up dangling modal host each render
const origCloseModal = closeModal;
function removeModalHost(){ const h=document.getElementById('modalHost'); if(h) h.remove(); }
const _renderApp = renderApp;
renderApp = function(){ removeModalHost(); _renderApp(); };

boot();
</script>
